<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>📖 Login - Task Manager</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 min-h-screen flex items-center justify-center">
        <!-- Contenedor Principal -->
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <!-- Titulo -->
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">
                🔐 Iniciar Sesión
            </h1>
            <p class="text-center text-gray-600 mb-8">
                Ingresa tus credenciales para continuar
            </p>
            <form id="loginForm" class="space-y-6">
                <!-- Campo Email -->
                <div>
                    <label
                        for="email"
                        class="block text-sm font-medium text-gray-700 mb-2"
                    >
                        Email
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="tu@email.com"
                        autocomplete="on"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    />
                </div>
                <!-- Campo Email -->
                <div>
                    <label
                        for="password"
                        class="block text-sm font-medium text-gray-700 mb-2"
                        >Password</label
                    >
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="*******"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    />
                </div>
                <!-- Boton Submit -->
                <button
                    type="submit"
                    class="w-full bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition duration-200"
                >
                    Inicar Sesion
                </button>
                <!-- Mensaje de error/exito -->
                <div
                    id="errorMessage"
                    class="hidden p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg"
                >
                    <p id="errorText"></p>
                </div>

                <div
                    id="successMessage"
                    class="hidden p-4 bg-green-100 border border-green-400 text-gray-700 rounded-lg"
                >
                    <p id="successText"></p>
                </div>
            </form>

            <!-- Link a registro -->
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    ¿No tienes cuenta?
                    <a
                        href="register.html"
                        class="text-blue-600 hover:text-blue-700 font-semibold hover:underline"
                    >
                        Regístrate aquí
                    </a>
                </p>
            </div>
        </div>
        <script src="/static/js/auth.js"></script>
        <script src="/static/js/utils.js"></script>
    </body>
</html>
