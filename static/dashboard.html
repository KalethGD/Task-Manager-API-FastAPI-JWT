<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>📖 Dashboard - Usuario</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 min-h-screen">
        <!-- Navbar -->
        <nav class="bg-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="flex justify-between items-center">
                    <!-- Logo/Titulo -->
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">📋</span>
                        <h1 class="text-xl font-bold text-gray-800">
                            Mis Trareas
                        </h1>
                    </div>

                    <!-- Usuario y Logout -->
                    <div class="felx items-center space-x-4">
                        <span id="userEmail" class="text-gray-600"></span>
                        <button
                            onclick="logout()"
                            class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition"
                        >
                            Cerrar Sesion
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Contenido principal -->
        <div class="max-w-7xl mx-auto p-6">
            <!-- Header de la sección -->
            <div class="mb-6">
                <h2 class="text-3xl font-bold text-gray-800 mb-2">
                    Bienvenido!
                </h2>
                <p class="text-gray-600">Gestiona tus tareas desde aquí</p>
            </div>
        </div>

        <!-- Formulario crear tarea -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex gap-3">
                <h3 class="text-xl font-bold text-gray-800 mb-4">
                    ➕ Nueva Tarea
                </h3>
                <h3 class="text-xl font-bold text-gray-800 mb-4"></h3>
            </div>
            <form id="createTaskForm" class="flex gap-4">
                <input
                    type="text"
                    id="taskTitle"
                    placeholder="Escribe una nueva tarea..."
                    required
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                />
                <button
                    type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-semibold"
                >
                    Agregar
                </button>
            </form>

            <!-- Lista de tareas -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-4">
                    📝 Mis Tareas
                </h3>

                <!-- Container donde se cargarán las tareas dinámicamente -->
                <div id="tasksList" class="space-y-3">
                    <!-- Las tareas se cargarán aquí con JavaScript -->
                    <p class="text-gray-500 text-center py-8">
                        Cargando tareas...
                    </p>
                </div>

                <!-- Controles de paginación -->
                <div
                    class="flex items-center justify-between mt-4 pt-4 border-t border-gray-200"
                >
                    <button
                        onclick="prevPage()"
                        id="prevPage"
                        class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-medium disabled:opacity-40 disabled:cursor-not-allowed"
                    >
                        ← Anterior
                    </button>
                    <span
                        id="pageInfo"
                        class="text-gray-600 text-sm font-medium"
                        >Página 1</span
                    >
                    <button
                        onclick="nextPage()"
                        id="nextPage"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium disabled:opacity-40 disabled:cursor-not-allowed"
                    >
                        Siguiente →
                    </button>
                </div>
            </div>
        </div>

        <!-- Mensaje de error/exito/alerta -->
        <div
            id="errorMessage"
            class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm"
        >
            <!-- El cuadro de la alerta (centrado) -->
            <div
                class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center border border-gray-100"
            >
                <!-- Icono opcional para llamar la atención -->
                <div
                    class="bg-red-400 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
                >
                    <span class="text-yellow-600 text-2xl">❌</span>
                </div>

                <p
                    id="errorText"
                    class="text-gray-800 text-lg font-medium mb-6 leading-tight"
                ></p>

                <button
                    onclick="
                        document
                            .getElementById('errorMessage')
                            .classList.add('hidden')
                    "
                    class="w-full bg-gray-900 hover:bg-black text-white font-bold py-3 px-6 rounded-xl transition-all active:scale-95"
                >
                    Entendido
                </button>
            </div>
        </div>

        <div
            id="successMessage"
            class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm"
        >
            <!-- El cuadro de la alerta (centrado) -->
            <div
                class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center border border-gray-100"
            >
                <!-- Icono opcional para llamar la atención -->
                <div
                    class="bg-green-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
                >
                    <span class="text-yellow-600 text-2xl">✅</span>
                </div>

                <p
                    id="successText"
                    class="text-gray-800 text-lg font-medium mb-6 leading-tight"
                ></p>

                <button
                    onclick="
                        document
                            .getElementById('successMessage')
                            .classList.add('hidden')
                    "
                    class="w-full bg-gray-900 hover:bg-black text-white font-bold py-3 px-6 rounded-xl transition-all active:scale-95"
                >
                    Entendido
                </button>
            </div>
        </div>
        <div
            id="alertMessage"
            class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm"
        >
            <!-- El cuadro de la alerta (centrado) -->
            <div
                class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center border border-gray-100"
            >
                <!-- Icono opcional para llamar la atención -->
                <div
                    class="bg-yellow-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
                >
                    <span class="text-yellow-600 text-2xl">⚠️</span>
                </div>

                <p
                    id="alertText"
                    class="text-gray-800 text-lg font-medium mb-6 leading-tight"
                ></p>

                <button
                    onclick="
                        document
                            .getElementById('alertMessage')
                            .classList.add('hidden')
                    "
                    class="w-full bg-gray-900 hover:bg-black text-white font-bold py-3 px-6 rounded-xl transition-all active:scale-95"
                >
                    Entendido
                </button>
            </div>
        </div>

        <!-- Scripts -->
        <script src="/static/js/utils.js"></script>
        <script src="/static/js/api.js"></script>
        <script>
            // Proteger pagina - require login
            requireAuth();

            // Mostrar email del usuario
            const userEmail = localStorage.getItem("userEmail");
            if (userEmail) {
                document.getElementById("userEmail").textContent = userEmail;
            }
        </script>
    </body>
</html>
